bundle:
  name: "simple-finance-analyst"

variables:
  warehouse_id:
    description: "SQL warehouse ID used for Delta writes and Genie query execution."
  genie_space_id:
    description: "Genie Space ID for the finance analyst experience."
  neo4j_secret_scope:
    description: "Databricks secret scope containing Neo4j connection values."
    default: "simple-finance-analyst"

sync:
  exclude:
    - ".venv/**"
    - "__pycache__/**"
    - ".pytest_cache/**"
    - "test-results/**"
    - ".env"
    - ".env.local"

resources:
  apps:
    simple-finance-analyst-app:
      name: "simple-finance-analyst"
      description: "Simple Finance Analyst Databricks App with Neo4j and Genie live backend"
      source_code_path: "."
      resources:
        - name: "sql-warehouse"
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: "CAN_USE"
        - name: "genie-space"
          genie_space:
            name: "simple-finance-analyst-genie"
            space_id: ${var.genie_space_id}
            permission: "CAN_RUN"
        - name: "neo4j-uri"
          secret:
            scope: ${var.neo4j_secret_scope}
            key: "neo4j_uri"
            permission: "READ"
        - name: "neo4j-username"
          secret:
            scope: ${var.neo4j_secret_scope}
            key: "neo4j_username"
            permission: "READ"
        - name: "neo4j-password"
          secret:
            scope: ${var.neo4j_secret_scope}
            key: "neo4j_password"
            permission: "READ"

targets:
  dev:
    mode: development
    default: true
