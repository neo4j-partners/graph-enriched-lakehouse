command:
  - gunicorn
  - app:app
  - -c
  - gunicorn_config.py

env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: USE_MOCK_BACKEND
    value: "true"
  # Set these via Databricks secrets when USE_MOCK_BACKEND=false:
  # NEO4J_URI, NEO4J_USERNAME, NEO4J_PASSWORD, GENIE_SPACE_ID
