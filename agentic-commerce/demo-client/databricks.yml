bundle:
  name: "agentic-commerce"

variables:
  retail_agent_endpoint_name:
    default: "agents_retail_assistant-retail-retail_agent_v3"

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build

resources:
  database_instances:
    agentic-commerce-db:
      name: "agentic-commerce"
      capacity: "CU_1"
  apps:
    agentic-commerce-app:
      name: "agentic-commerce"
      description: "agentic-commerce created with apx"
      source_code_path: ./.build
      resources:
        - name: "db"
          database:
            database_name: "databricks_postgres"
            instance_name: ${resources.database_instances.agentic-commerce-db.name}
            permission: "CAN_CONNECT_AND_CREATE"
        - name: "retail-agent"
          serving_endpoint:
            name: ${var.retail_agent_endpoint_name}
            permission: "CAN_QUERY"

targets:
  dev:
    mode: development
    default: true
