name: Analyst Client UI Tests

on:
  pull_request:
    paths:
      - .github/workflows/analyst-client-ui-tests.yml
      - finance-genie/analyst-client/**
      - finance-genie/automate-ui-testing.md
  push:
    branches:
      - main
    paths:
      - .github/workflows/analyst-client-ui-tests.yml
      - finance-genie/analyst-client/**
      - finance-genie/automate-ui-testing.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: analyst-client-ui-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-genie/analyst-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: finance-genie/analyst-client/uv.lock

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Install Chromium
        run: uv run python -m playwright install --with-deps chromium

      - name: Run UI tests
        run: >-
          uv run pytest tests
          --browser chromium
          --tracing retain-on-failure
          --screenshot only-on-failure

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyst-client-playwright-artifacts
          path: finance-genie/analyst-client/test-results/
          if-no-files-found: ignore
