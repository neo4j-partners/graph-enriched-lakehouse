name: Deploy Finance Genie Slides

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-finance-genie-slides.yml
      - finance-genie/demo-guide/slides/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: finance-genie/demo-guide/slides/package-lock.json

      - name: Install Marp dependencies
        working-directory: finance-genie/demo-guide/slides
        run: npm ci

      - name: Build slides
        working-directory: finance-genie/demo-guide/slides
        run: |
          mkdir -p build
          npx marp slides.md -o build/index.html --html
          cp *.png build/
          touch build/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: finance-genie/demo-guide/slides/build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
