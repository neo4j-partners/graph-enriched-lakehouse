bundle:
  name: sql-semantics

variables:
  dbxcarta_version:
    description: Published dbxcarta version to install in Databricks Jobs
    default: 0.2.41
  databricks_sdk_version:
    description: databricks-sdk version used by the question upload task
    default: 0.108.0
  python_dotenv_version:
    description: python-dotenv version used by the question upload task
    default: 1.2.2
  spark_version:
    description: Classic Databricks Runtime with Scala version matching the Neo4j connector
    default: 14.3.x-scala2.12
  node_type_id:
    description: Classic jobs compute node type
    default: i3.xlarge
  neo4j_connector_maven:
    description: Neo4j Spark Connector Maven coordinate matching Spark/Scala runtime
    default: org.neo4j:neo4j-connector-apache-spark_2.12:5.3.6_for_spark_3
  catalog:
    description: UC catalog containing the Finance Genie schema
    default: graph-enriched-lakehouse
  schema:
    description: UC schema to ingest
    default: graph-enriched-schema
  volume:
    description: UC volume name for run artifacts
    default: graph-enriched-volume
  warehouse_id:
    description: SQL warehouse ID for catalog checks and client evaluation runs
  secret_scope:
    description: Databricks secret scope holding NEO4J_URI, NEO4J_USERNAME, and NEO4J_PASSWORD
    default: dbxcarta-neo4j
  chat_endpoint:
    description: Model serving endpoint name for SQL generation
    default: databricks-claude-sonnet-4-6
  embedding_endpoint:
    description: Embedding serving endpoint used by ingest and client retrieval
    default: databricks-gte-large-en

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    sql_semantics_ingest:
      name: "[${bundle.target}] sql-semantics ingest"
      tasks:
        - task_key: ingest
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: 1
            data_security_mode: SINGLE_USER
          python_wheel_task:
            package_name: dbxcarta
            entry_point: dbxcarta-ingest
            parameters:
              - "DATABRICKS_SECRET_SCOPE={{job.parameters.databricks_secret_scope}}"
              - "DATABRICKS_WAREHOUSE_ID={{job.parameters.databricks_warehouse_id}}"
              - "DBXCARTA_CATALOG={{job.parameters.dbxcarta_catalog}}"
              - "DBXCARTA_SCHEMAS={{job.parameters.dbxcarta_schemas}}"
              - "DATABRICKS_VOLUME_PATH={{job.parameters.databricks_volume_path}}"
              - "DBXCARTA_SUMMARY_VOLUME={{job.parameters.dbxcarta_summary_volume}}"
              - "DBXCARTA_SUMMARY_TABLE={{job.parameters.dbxcarta_summary_table}}"
              - "DBXCARTA_INCLUDE_VALUES=true"
              - "DBXCARTA_SAMPLE_LIMIT=10"
              - "DBXCARTA_SAMPLE_CARDINALITY_THRESHOLD=50"
              - "DBXCARTA_INCLUDE_EMBEDDINGS_TABLES=true"
              - "DBXCARTA_INCLUDE_EMBEDDINGS_COLUMNS=true"
              - "DBXCARTA_INCLUDE_EMBEDDINGS_VALUES=true"
              - "DBXCARTA_INCLUDE_EMBEDDINGS_SCHEMAS=true"
              - "DBXCARTA_INCLUDE_EMBEDDINGS_DATABASES=true"
              - "DBXCARTA_INFER_SEMANTIC=true"
              - "DBXCARTA_EMBEDDING_ENDPOINT={{job.parameters.dbxcarta_embedding_endpoint}}"
              - "DBXCARTA_EMBEDDING_DIMENSION=1024"
              - "DBXCARTA_EMBEDDING_FAILURE_THRESHOLD=0.10"
          libraries:
            - pypi:
                package: "dbxcarta==${var.dbxcarta_version}"
            - maven:
                coordinates: ${var.neo4j_connector_maven}
          timeout_seconds: 7200
      parameters:
        - name: databricks_secret_scope
          default: ${var.secret_scope}
        - name: databricks_warehouse_id
          default: ${var.warehouse_id}
        - name: dbxcarta_catalog
          default: ${var.catalog}
        - name: dbxcarta_schemas
          default: ${var.schema}
        - name: databricks_volume_path
          default: /Volumes/${var.catalog}/${var.schema}/${var.volume}
        - name: dbxcarta_summary_volume
          default: /Volumes/${var.catalog}/${var.schema}/${var.volume}/dbxcarta/runs
        - name: dbxcarta_summary_table
          default: ${var.catalog}.${var.schema}.dbxcarta_run_summary
        - name: dbxcarta_embedding_endpoint
          default: ${var.embedding_endpoint}

    sql_semantics_client:
      name: "[${bundle.target}] sql-semantics client"
      job_clusters:
        - job_cluster_key: client_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: 1
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: upload_questions
          job_cluster_key: client_cluster
          spark_python_task:
            python_file: ./src/sql_semantics/upload_questions.py
            parameters:
              - "--dest"
              - "{{job.parameters.dbxcarta_client_questions}}"
          libraries:
            - pypi:
                package: "databricks-sdk==${var.databricks_sdk_version}"
            - pypi:
                package: "python-dotenv==${var.python_dotenv_version}"
          timeout_seconds: 900
        - task_key: client
          depends_on:
            - task_key: upload_questions
          job_cluster_key: client_cluster
          python_wheel_task:
            package_name: dbxcarta
            entry_point: dbxcarta-client
            parameters:
              - "DATABRICKS_SECRET_SCOPE={{job.parameters.databricks_secret_scope}}"
              - "DATABRICKS_WAREHOUSE_ID={{job.parameters.databricks_warehouse_id}}"
              - "DBXCARTA_CATALOG={{job.parameters.dbxcarta_catalog}}"
              - "DBXCARTA_SCHEMAS={{job.parameters.dbxcarta_schemas}}"
              - "DATABRICKS_VOLUME_PATH={{job.parameters.databricks_volume_path}}"
              - "DBXCARTA_SUMMARY_VOLUME={{job.parameters.dbxcarta_summary_volume}}"
              - "DBXCARTA_SUMMARY_TABLE={{job.parameters.dbxcarta_summary_table}}"
              - "DBXCARTA_CHAT_ENDPOINT={{job.parameters.dbxcarta_chat_endpoint}}"
              - "DBXCARTA_EMBEDDING_ENDPOINT={{job.parameters.dbxcarta_embedding_endpoint}}"
              - "DBXCARTA_CLIENT_QUESTIONS={{job.parameters.dbxcarta_client_questions}}"
              - "DBXCARTA_CLIENT_ARMS=no_context,schema_dump,graph_rag"
              - "DBXCARTA_INJECT_CRITERIA=false"
          libraries:
            - pypi:
                package: "dbxcarta==${var.dbxcarta_version}"
          timeout_seconds: 3600
      parameters:
        - name: databricks_secret_scope
          default: ${var.secret_scope}
        - name: databricks_warehouse_id
          default: ${var.warehouse_id}
        - name: dbxcarta_catalog
          default: ${var.catalog}
        - name: dbxcarta_schemas
          default: ${var.schema}
        - name: databricks_volume_path
          default: /Volumes/${var.catalog}/${var.schema}/${var.volume}
        - name: dbxcarta_summary_volume
          default: /Volumes/${var.catalog}/${var.schema}/${var.volume}/dbxcarta/runs
        - name: dbxcarta_summary_table
          default: ${var.catalog}.${var.schema}.dbxcarta_run_summary
        - name: dbxcarta_chat_endpoint
          default: ${var.chat_endpoint}
        - name: dbxcarta_embedding_endpoint
          default: ${var.embedding_endpoint}
        - name: dbxcarta_client_questions
          default: /Volumes/${var.catalog}/${var.schema}/${var.volume}/dbxcarta/questions.json
