bundle:
  name: sql-semantics

variables:
  catalog:
    description: UC catalog containing the Finance Genie schema
    default: graph-enriched-lakehouse
  schema:
    description: UC schema to ingest
    default: graph-enriched-schema
  volume:
    description: UC volume name for run artifacts
    default: graph-enriched-volume
  warehouse_id:
    description: SQL warehouse ID for client evaluation runs
  secret_scope:
    description: Databricks secret scope holding Neo4j credentials (neo4j_uri, neo4j_username, neo4j_password)
    default: dbxcarta-neo4j
  chat_endpoint:
    description: Model serving endpoint name for SQL generation
    default: databricks-claude-sonnet-4-6

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
    run_as:
      service_principal_name: sql-semantics-sp

resources:
  jobs:
    sql_semantics_ingest:
      name: "[${bundle.target}] sql-semantics ingest"
      tasks:
        - task_key: ingest
          python_wheel_task:
            package_name: dbxcarta
            entry_point: dbxcarta-ingest
          libraries:
            - pypi:
                package: "dbxcarta>=0.2.38"
            - pypi:
                package: "sql-semantics>=0.1.0"
          environment_variables:
            DATABRICKS_SECRET_SCOPE: ${var.secret_scope}
            DBXCARTA_CATALOG: ${var.catalog}
            DBXCARTA_SCHEMAS: ${var.schema}
            DATABRICKS_VOLUME_PATH: /Volumes/${var.catalog}/${var.schema}/${var.volume}
            DBXCARTA_SUMMARY_VOLUME: /Volumes/${var.catalog}/${var.schema}/${var.volume}/dbxcarta/runs
            DBXCARTA_SUMMARY_TABLE: ${var.catalog}.${var.schema}.dbxcarta_run_summary
            DBXCARTA_INCLUDE_VALUES: "true"
            DBXCARTA_SAMPLE_LIMIT: "10"
            DBXCARTA_SAMPLE_CARDINALITY_THRESHOLD: "50"
            DBXCARTA_INCLUDE_EMBEDDINGS_TABLES: "true"
            DBXCARTA_INCLUDE_EMBEDDINGS_COLUMNS: "true"
            DBXCARTA_INCLUDE_EMBEDDINGS_VALUES: "true"
            DBXCARTA_INCLUDE_EMBEDDINGS_SCHEMAS: "true"
            DBXCARTA_INCLUDE_EMBEDDINGS_DATABASES: "true"
            DBXCARTA_INFER_SEMANTIC: "true"
            DBXCARTA_EMBEDDING_ENDPOINT: databricks-gte-large-en
            DBXCARTA_EMBEDDING_DIMENSION: "1024"
            DBXCARTA_EMBEDDING_FAILURE_THRESHOLD: "0.10"

    sql_semantics_client:
      name: "[${bundle.target}] sql-semantics client"
      tasks:
        - task_key: client
          python_wheel_task:
            package_name: dbxcarta
            entry_point: dbxcarta-client
          libraries:
            - pypi:
                package: "dbxcarta>=0.2.38"
            - pypi:
                package: "sql-semantics>=0.1.0"
          environment_variables:
            DATABRICKS_SECRET_SCOPE: ${var.secret_scope}
            DATABRICKS_WAREHOUSE_ID: ${var.warehouse_id}
            DBXCARTA_CATALOG: ${var.catalog}
            DBXCARTA_SCHEMAS: ${var.schema}
            DATABRICKS_VOLUME_PATH: /Volumes/${var.catalog}/${var.schema}/${var.volume}
            DBXCARTA_SUMMARY_VOLUME: /Volumes/${var.catalog}/${var.schema}/${var.volume}/dbxcarta/runs
            DBXCARTA_SUMMARY_TABLE: ${var.catalog}.${var.schema}.dbxcarta_run_summary
            DBXCARTA_CHAT_ENDPOINT: ${var.chat_endpoint}
            DBXCARTA_CLIENT_QUESTIONS: /Volumes/${var.catalog}/${var.schema}/${var.volume}/dbxcarta/questions.json
            DBXCARTA_CLIENT_ARMS: no_context,schema_dump,graph_rag
            DBXCARTA_INJECT_CRITERIA: "false"
